<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buenas noches, hermosa esposa</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: Georgia, 'Times New Roman', serif;
  }

  .sky {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, #1a1040 0%, #0a0a1a 70%);
    z-index: 0;
  }

  .stars { position: fixed; inset: 0; z-index: 1; }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    0%   { opacity: 0.2; transform: scale(1); }
    100% { opacity: 1;   transform: scale(1.4); }
  }

  .moon {
    position: fixed;
    top: 40px; right: 100px;
    width: 80px; height: 80px;
    background: #ffeea0;
    border-radius: 50%;
    box-shadow: 0 0 50px 15px rgba(255,238,160,0.35);
    z-index: 2;
    animation: moonGlow 4s ease-in-out infinite alternate;
  }

  @keyframes moonGlow {
    0%   { box-shadow: 0 0 40px 10px rgba(255,238,160,0.3); }
    100% { box-shadow: 0 0 70px 25px rgba(255,238,160,0.5); }
  }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; gap: 24px;
    padding: 40px 30px; text-align: center;
  }

  .title {
    font-family: Georgia, serif;
    font-size: clamp(2rem, 6vw, 3.8rem);
    font-weight: normal;
    color: #ffeea0;
    text-shadow: 0 0 20px rgba(255,238,160,0.6);
    line-height: 1.3;
    animation: fadeDown 1.2s ease forwards;
    opacity: 0;
  }

  .title em {
    color: #ffb3c6;
    font-style: italic;
    text-shadow: 0 0 20px rgba(255,179,198,0.7);
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .owl-wrap {
    animation: float 4s ease-in-out infinite, fadeIn 1.2s 0.6s ease forwards;
    opacity: 0; margin: 6px 0;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-14px); }
  }

  @keyframes fadeIn { to { opacity: 1; } }

  .legend {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    color: #c8b8e8;
    max-width: 480px;
    line-height: 2;
    text-shadow: 0 0 12px rgba(180,140,220,0.4);
    animation: fadeUp 1.5s 1.1s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(15px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hearts {
    font-size: 1.4rem;
    animation: fadeUp 1.5s 1.6s ease forwards;
    opacity: 0; letter-spacing: 8px;
  }

  .owl-eye   { animation: blink 5s ease-in-out infinite; transform-origin: 83px 75px; }
  .owl-eye-r { animation: blink 5s ease-in-out infinite; transform-origin: 117px 75px; }

  @keyframes blink {
    0%, 88%, 100% { transform: scaleY(1); }
    93%            { transform: scaleY(0.08); }
  }
</style>
</head>
<body>

<div class="sky"></div>
<div class="stars" id="stars"></div>
<div class="moon"></div>

<div class="content">
  <div class="title">
    Buenas noches,<br>
    <em>hermosa esposa</em> &#127769;
  </div>

  <div class="owl-wrap">
    <svg width="200" height="220" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="100" cy="140" rx="55" ry="65" fill="#5a3e7a"/>
      <ellipse cx="100" cy="150" rx="35" ry="45" fill="#c89ddc"/>
      <ellipse cx="100" cy="145" rx="26" ry="10" fill="#b580cc" opacity="0.5"/>
      <ellipse cx="100" cy="158" rx="26" ry="10" fill="#b580cc" opacity="0.5"/>
      <ellipse cx="100" cy="171" rx="22" ry="8"  fill="#b580cc" opacity="0.4"/>
      <ellipse cx="52"  cy="145" rx="22" ry="40" fill="#6a4a8a" transform="rotate(-12 52 145)"/>
      <ellipse cx="148" cy="145" rx="22" ry="40" fill="#6a4a8a" transform="rotate(12 148 145)"/>
      <ellipse cx="100" cy="75" rx="48" ry="46" fill="#5a3e7a"/>
      <polygon points="72,35 60,10 82,28" fill="#5a3e7a"/>
      <polygon points="128,35 140,10 118,28" fill="#5a3e7a"/>
      <ellipse cx="100" cy="80" rx="38" ry="36" fill="#7d5ea0"/>
      <circle cx="83"  cy="75" r="16" fill="#ffeea0"/>
      <circle cx="117" cy="75" r="16" fill="#ffeea0"/>
      <circle cx="83"  cy="75" r="9" fill="#1a0a30" class="owl-eye"/>
      <circle cx="117" cy="75" r="9" fill="#1a0a30" class="owl-eye-r"/>
      <circle cx="86"  cy="72" r="3" fill="white"/>
      <circle cx="120" cy="72" r="3" fill="white"/>
      <polygon points="100,88 91,100 109,100" fill="#f0c060"/>
      <line x1="100" y1="88" x2="100" y2="100" stroke="#d4a040" stroke-width="1.5"/>
      <line x1="85" y1="198" x2="78" y2="212" stroke="#f0c060" stroke-width="4" stroke-linecap="round"/>
      <line x1="85" y1="198" x2="86" y2="214" stroke="#f0c060" stroke-width="4" stroke-linecap="round"/>
      <line x1="85" y1="198" x2="94" y2="212" stroke="#f0c060" stroke-width="4" stroke-linecap="round"/>
      <line x1="115" y1="198" x2="108" y2="212" stroke="#f0c060" stroke-width="4" stroke-linecap="round"/>
      <line x1="115" y1="198" x2="114" y2="214" stroke="#f0c060" stroke-width="4" stroke-linecap="round"/>
      <line x1="115" y1="198" x2="122" y2="212" stroke="#f0c060" stroke-width="4" stroke-linecap="round"/>
      <path d="M95,130 C95,127 92,125 90,127 C88,129 90,132 95,135 C100,132 102,129 100,127 C98,125 95,127 95,130 Z" fill="#ff6b95"/>
    </svg>
  </div>

  <div class="legend">
    Que esta noche te lleve muy lejos,<br>
    a lugares m&#225;gicos llenos de color,<br>
    donde cada sue&#241;o sea un reflejo<br>
    de todo el amor que llena mi coraz&#243;n. &#128156;
  </div>

  <div class="hearts">&#128149; &#10024; &#128149;</div>
</div>

<script>
  var c = document.getElementById('stars');
  for (var i = 0; i < 130; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    var sz = (Math.random() * 2.5 + 0.5).toFixed(1);
    s.style.cssText =
      'width:' + sz + 'px;height:' + sz + 'px;' +
      'top:' + (Math.random() * 100).toFixed(1) + '%;' +
      'left:' + (Math.random() * 100).toFixed(1) + '%;' +
      '--d:' + (Math.random() * 3 + 1.5).toFixed(1) + 's;' +
      'animation-delay:' + (Math.random() * 5).toFixed(1) + 's;';
    c.appendChild(s);
  }
</script>
</body>
</html>
